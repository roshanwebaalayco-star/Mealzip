packages:
  "framer-motion": "For page transitions, smooth enter animations, and micro-interactions"
  "recharts": "For rendering nutrition analysis and macro progress charts"
  "date-fns": "For formatting dates nicely in meal plans and chat"
  "lucide-react": "For UI icons across the application"

images:
  - path: "artifacts/nutrinext/public/images/hero-spices.png"
    description: "Rich flatlay of vibrant Indian spices like turmeric, chili, cumin, star anise in small bowls, modern warm lighting, soft shadows, photorealistic top-down view"
    aspect_ratio: "16:9"
  - path: "artifacts/nutrinext/public/images/logo.png"
    description: "Minimal geometric logo icon representing a family intertwined with a green leaf, using warm saffron orange and deep emerald green colors, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/nutrinext/public/images/food-scan-placeholder.png"
    description: "Abstract soft illustration of an Indian thali meal with scanning reticle overlay, pastel saffron and green colors, modern UI placeholder graphic"
    aspect_ratio: "4:3"

notes:
  - "Assumes @workspace/api-client-react exports all React Query hooks correctly"
  - "App uses generative AI endpoints (SSE for chat, base64 for vision/voice) which are fully wired in hooks"
  - "Demo mode seeds the DB with Sharma family data for immediate hackathon judging"
